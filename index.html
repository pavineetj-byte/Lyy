<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลองกดดูสิลิลลี่ 🐾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#FFF3C4;
    --yellow-deep:#FCE08A;
    --yellow-btn:#F8CD52;
    --yellow-btn-shadow:#E0AC2E;
    --pink:#FFD9E3;
    --pink-deep:#FFB6C9;
    --white:#FFFFFF;
    --text:#6B5B52;
    --text-soft:#9C8B80;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:'Sarabun',sans-serif;
    overflow-x:hidden;
    color:var(--text);
  }
  body{
    min-height:100vh;
    background: linear-gradient(180deg, #FFFDF6 0%, var(--yellow) 55%, var(--pink) 100%);
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  /* soft ambient blobs - minimal ghibli touch */
  .blob{
    position:absolute;
    border-radius:50%;
    filter:blur(2px);
    opacity:0.55;
  }
  .blob1{ width:220px;height:220px; background:var(--pink-deep); top:-60px; left:-60px; opacity:0.35;}
  .blob2{ width:180px;height:180px; background:var(--yellow-deep); bottom:-50px; right:-40px; opacity:0.4;}
  .blob3{ width:90px;height:90px; background:#fff; top:12%; right:8%; opacity:0.6;}
  .blob4{ width:60px;height:60px; background:#fff; bottom:16%; left:6%; opacity:0.6;}

  .leaf{
    position:absolute;
    font-size:26px;
    opacity:0.5;
  }
  .leaf1{ top:10%; left:10%; transform:rotate(-15deg);}
  .leaf2{ bottom:8%; right:12%; transform:rotate(20deg);}

  /* ---------- particle hearts on click ---------- */
  .particle{
    position:fixed;
    pointer-events:none;
    font-size:20px;
    opacity:0;
    animation: floatup 3.2s ease-in forwards;
    z-index:50;
  }
  @keyframes floatup{
    0%{ opacity:0; transform:translateY(0) scale(0.6) rotate(0deg); }
    12%{ opacity:1; }
    100%{ opacity:0; transform:translateY(-240px) scale(1.15) rotate(20deg); }
  }

  /* ---------- main card ---------- */
  .stage{
    position:relative;
    z-index:5;
    width:min(380px,100%);
    background: var(--white);
    border-radius:32px;
    padding:40px 28px 34px 28px;
    box-shadow: 0 20px 50px rgba(220,180,150,0.35);
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition: transform .3s ease, opacity .3s ease;
  }

  h1{
    font-family:'Mali',cursive;
    font-weight:700;
    font-size:clamp(24px,6vw,30px);
    color:var(--text);
    margin:0 0 8px 0;
  }
  .sub{
    font-family:'Mali',cursive;
    font-size:15px;
    color:var(--text-soft);
    margin:0 0 26px 0;
  }

  .cat-emoji-row{
    font-size:34px;
    margin-bottom:22px;
  }

  button{
    font-family:'Mali',cursive;
    font-weight:700;
    border:none;
    cursor:pointer;
    border-radius:999px;
    color:var(--text);
  }

  #startBtn{
    width:150px;height:150px;
    border-radius:50%;
    background: radial-gradient(circle at 32% 28%, #fff, var(--pink-deep) 60%, #FF9FB5 100%);
    box-shadow:
      0 8px 0 #E88AA0,
      0 16px 28px rgba(232,138,160,0.4);
    font-size:19px;
    color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,0.1);
    transition: transform .08s ease, box-shadow .08s ease;
  }
  #startBtn:active{
    transform:translateY(6px);
    box-shadow: 0 2px 0 #E88AA0, 0 4px 10px rgba(232,138,160,0.4);
  }

  .stage-caption{
    margin-top:16px;
    font-family:'Mali',cursive;
    font-size:13px;
    color:var(--text-soft);
  }

  /* ---------- reveal images ---------- */
  .reveal-img{
    width:100%;
    max-width:280px;
    border-radius:22px;
    box-shadow:0 10px 24px rgba(180,150,120,0.3);
    display:block;
    margin:0 auto;
  }

  .hidden{ display:none !important; }

  #nextBtn{
    margin-top:22px;
    padding:14px 34px;
    background: linear-gradient(180deg, #FFE28A, var(--yellow-btn));
    box-shadow: 0 6px 0 var(--yellow-btn-shadow), 0 12px 20px rgba(224,172,46,0.35);
    font-size:16px;
    opacity:0;
    transform: translateY(14px) scale(0.8);
    animation: popIn .55s cubic-bezier(.34,1.56,.64,1) forwards, bob 1.4s ease-in-out .55s infinite;
  }
  @keyframes popIn{
    to{ opacity:1; transform: translateY(0) scale(1); }
  }
  @keyframes bob{
    0%,100%{ transform: translateY(0) scale(1); }
    50%{ transform: translateY(-6px) scale(1); }
  }
  #nextBtn:active{
    transform:translateY(2px) scale(0.97) !important;
    animation:none;
  }

  .final-text{
    font-family:'Mali',cursive;
    font-weight:700;
    font-size:clamp(20px,5.5vw,24px);
    color:var(--text);
    margin-top:18px;
    line-height:1.4;
  }

  footer{
    position:fixed;
    bottom:10px;
    left:0;right:0;
    text-align:center;
    font-family:'Mali',cursive;
    font-size:11px;
    color:var(--text-soft);
    opacity:0.6;
    z-index:5;
  }
</style>
</head>

<script>
  function burstParticles(originEl){
    const emojis = ['💛','✨','🌼','💕'];
    const rect = originEl.getBoundingClientRect();
    for(let i=0;i<16;i++){
      const p = document.createElement('div');
      p.className='particle';
      p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      const x = rect.left + rect.width/2 + (Math.random()-0.5)*160;
      const y = rect.top + rect.height/2 + (Math.random()-0.5)*40;
      p.style.left = x+'px';
      p.style.top = y+'px';
      p.style.animationDelay = (Math.random()*0.35)+'s';
      p.style.fontSize = (14+Math.random()*16)+'px';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 3800);
    }
  }

  const stage1 = document.getElementById('stage1');
  const stage2 = document.getElementById('stage2');
  const stage3 = document.getElementById('stage3');
  const startBtn = document.getElementById('startBtn');
  const nextBtn = document.getElementById('nextBtn');

  startBtn.addEventListener('click', ()=>{
    burstParticles(startBtn);
    setTimeout(()=>{
      stage1.classList.add('hidden');
      stage2.classList.remove('hidden');
      // show the "next" bouncy button after 5 seconds
      setTimeout(()=>{
        nextBtn.classList.remove('hidden');
      }, 5000);
    }, 200);
  });

  nextBtn.addEventListener('click', ()=>{
    burstParticles(nextBtn);
    setTimeout(()=>{
      stage2.classList.add('hidden');
      stage3.classList.remove('hidden');
    }, 150);
  });
</script>
